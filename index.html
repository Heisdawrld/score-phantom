<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScorePhantom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #161625;
    --surface3: #1e1e30;
    --border: #2a2a40;
    --purple: #7c3aed;
    --purple-light: #9d5ff5;
    --purple-dim: #3d1d7a;
    --accent: #c084fc;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --text: #f1f0ff;
    --text-muted: #7c7a9e;
    --text-dim: #4a4860;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
overflow-x: hidden;
}

/* BG texture */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 60% 40% at 80% 10%, rgba(124,58,237,0.12) 0%, transparent 60%),
radial-gradient(ellipse 40% 30% at 10% 80%, rgba(124,58,237,0.07) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

/* ── HEADER ── */
header {
position: sticky;
top: 0;
z-index: 100;
background: rgba(8,8,16,0.92);
backdrop-filter: blur(16px);
border-bottom: 1px solid var(–border);
padding: 0 16px;
height: 56px;
display: flex;
align-items: center;
justify-content: space-between;
}

.logo {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 18px;
letter-spacing: -0.5px;
color: var(–text);
display: flex;
align-items: center;
gap: 8px;
}

.logo-icon {
width: 28px;
height: 28px;
background: linear-gradient(135deg, var(–purple), var(–accent));
border-radius: 8px;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
}

.logo span { color: var(–accent); }

.live-badge {
font-size: 10px;
font-weight: 500;
color: var(–green);
border: 1px solid rgba(34,197,94,0.3);
background: rgba(34,197,94,0.08);
padding: 2px 8px;
border-radius: 20px;
letter-spacing: 1px;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 5px;
}

.live-dot {
width: 5px;
height: 5px;
background: var(–green);
border-radius: 50%;
animation: pulse 2s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

/* ── MAIN ── */
main {
position: relative;
z-index: 1;
max-width: 480px;
margin: 0 auto;
padding: 0 0 100px;
}

/* ── SEARCH & FILTERS ── */
.search-section {
padding: 16px;
display: flex;
flex-direction: column;
gap: 10px;
}

.search-box {
position: relative;
}

.search-box input {
width: 100%;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 12px 16px 12px 42px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 13px;
outline: none;
transition: border-color 0.2s;
}

.search-box input:focus { border-color: var(–purple); }
.search-box input::placeholder { color: var(–text-dim); }

.search-icon {
position: absolute;
left: 14px;
top: 50%;
transform: translateY(-50%);
color: var(–text-dim);
font-size: 16px;
}

.filter-scroll {
display: flex;
gap: 8px;
overflow-x: auto;
padding-bottom: 4px;
scrollbar-width: none;
}

.filter-scroll::-webkit-scrollbar { display: none; }

.filter-chip {
flex-shrink: 0;
padding: 6px 14px;
border-radius: 20px;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-muted);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
}

.filter-chip:hover, .filter-chip.active {
border-color: var(–purple);
background: var(–purple-dim);
color: var(–accent);
}

/* ── SECTION LABEL ── */
.section-label {
padding: 8px 16px 4px;
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-dim);
display: flex;
align-items: center;
justify-content: space-between;
}

.section-count {
background: var(–surface2);
border: 1px solid var(–border);
padding: 2px 8px;
border-radius: 10px;
font-size: 10px;
color: var(–text-muted);
}

/* ── FIXTURE CARD ── */
.fixture-card {
margin: 6px 16px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 14px;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
}

.fixture-card::before {
content: ‘’;
position: absolute;
left: 0;
top: 0;
bottom: 0;
width: 3px;
background: var(–border);
transition: background 0.2s;
}

.fixture-card:hover {
border-color: var(–purple-dim);
transform: translateY(-1px);
box-shadow: 0 8px 32px rgba(124,58,237,0.15);
}

.fixture-card:hover::before {
background: linear-gradient(180deg, var(–purple), var(–accent));
}

.fixture-card.enriched::before {
background: linear-gradient(180deg, var(–purple), var(–accent));
}

.fixture-meta {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 10px;
}

.fixture-league {
font-size: 10px;
color: var(–text-muted);
display: flex;
align-items: center;
gap: 6px;
}

.league-dot {
width: 4px;
height: 4px;
background: var(–purple-light);
border-radius: 50%;
}

.fixture-time {
font-size: 10px;
color: var(–text-dim);
}

.fixture-teams {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
}

.team {
flex: 1;
display: flex;
flex-direction: column;
gap: 2px;
}

.team.away { text-align: right; }

.team-name {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 14px;
color: var(–text);
line-height: 1.2;
}

.team-country {
font-size: 10px;
color: var(–text-dim);
}

.vs-badge {
font-size: 10px;
color: var(–text-dim);
padding: 4px 8px;
border: 1px solid var(–border);
border-radius: 6px;
flex-shrink: 0;
}

.fixture-footer {
margin-top: 10px;
display: flex;
align-items: center;
justify-content: space-between;
}

.enriched-tag {
font-size: 9px;
letter-spacing: 1px;
text-transform: uppercase;
color: var(–purple-light);
background: rgba(124,58,237,0.12);
border: 1px solid rgba(124,58,237,0.2);
padding: 2px 8px;
border-radius: 10px;
}

.predict-btn {
font-size: 10px;
color: var(–accent);
display: flex;
align-items: center;
gap: 4px;
letter-spacing: 0.5px;
}

/* ── LOADING ── */
.loading-state {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 60px 20px;
gap: 16px;
}

.spinner {
width: 32px;
height: 32px;
border: 2px solid var(–border);
border-top-color: var(–purple);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
font-size: 12px;
color: var(–text-muted);
letter-spacing: 1px;
}

/* ── PREDICTION MODAL ── */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.8);
backdrop-filter: blur(8px);
z-index: 200;
display: none;
align-items: flex-end;
justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
width: 100%;
max-width: 480px;
background: var(–surface);
border-radius: 24px 24px 0 0;
border: 1px solid var(–border);
border-bottom: none;
max-height: 92vh;
overflow-y: auto;
scrollbar-width: none;
animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.modal::-webkit-scrollbar { display: none; }

@keyframes slideUp {
from { transform: translateY(100%); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}

.modal-handle {
width: 36px;
height: 4px;
background: var(–border);
border-radius: 2px;
margin: 12px auto 0;
}

.modal-header {
padding: 16px 20px 0;
display: flex;
align-items: center;
justify-content: space-between;
}

.modal-close {
width: 32px;
height: 32px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
color: var(–text-muted);
font-size: 16px;
transition: all 0.15s;
}

.modal-close:hover { border-color: var(–purple); color: var(–accent); }

.modal-match-title {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 18px;
text-align: center;
line-height: 1.2;
}

.modal-league-tag {
font-size: 10px;
color: var(–text-muted);
text-align: center;
margin-top: 4px;
letter-spacing: 1px;
text-transform: uppercase;
}

/* ── TOP PICK CARD ── */
.top-pick-card {
margin: 16px 20px;
background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(192,132,252,0.08));
border: 1px solid rgba(124,58,237,0.4);
border-radius: 16px;
padding: 16px;
position: relative;
overflow: hidden;
}

.top-pick-card::before {
content: ‘★ TOP PICK’;
position: absolute;
top: 12px;
right: 14px;
font-size: 9px;
letter-spacing: 1.5px;
color: var(–accent);
opacity: 0.7;
}

.top-pick-label {
font-size: 10px;
color: var(–text-muted);
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 6px;
}

.top-pick-value {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 22px;
color: var(–accent);
margin-bottom: 4px;
}

.top-pick-prob {
font-size: 12px;
color: var(–text-muted);
}

.top-pick-prob strong {
color: var(–text);
font-size: 14px;
}

.confidence-bar {
margin-top: 10px;
height: 4px;
background: var(–surface3);
border-radius: 2px;
overflow: hidden;
}

.confidence-fill {
height: 100%;
border-radius: 2px;
background: linear-gradient(90deg, var(–purple), var(–accent));
transition: width 0.6s ease;
}

/* ── RESULT BARS ── */
.result-section {
padding: 0 20px 16px;
}

.result-section-title {
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-dim);
margin-bottom: 12px;
}

.result-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 8px;
}

.result-label {
font-size: 11px;
color: var(–text-muted);
width: 60px;
flex-shrink: 0;
}

.result-bar-wrap {
flex: 1;
height: 6px;
background: var(–surface3);
border-radius: 3px;
overflow: hidden;
}

.result-bar {
height: 100%;
border-radius: 3px;
transition: width 0.6s ease;
}

.bar-home { background: var(–purple-light); }
.bar-draw { background: var(–text-dim); }
.bar-away { background: var(–accent); }

.result-pct {
font-size: 11px;
color: var(–text);
width: 36px;
text-align: right;
flex-shrink: 0;
}

/* ── MARKET GRID ── */
.market-grid {
padding: 0 20px 16px;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
}

.market-card {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 12px;
padding: 12px;
}

.market-title {
font-size: 9px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–text-dim);
margin-bottom: 8px;
}

.market-row {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 4px;
}

.market-key {
font-size: 11px;
color: var(–text-muted);
}

.market-val {
font-size: 11px;
color: var(–text);
font-weight: 500;
}

.market-val.high { color: var(–green); }
.market-val.med { color: var(–yellow); }
.market-val.low { color: var(–text-muted); }

/* ── CORRECT SCORE ── */
.scores-section {
padding: 0 20px 16px;
}

.scores-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 6px;
}

.score-chip {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 10px;
padding: 8px 6px;
text-align: center;
}

.score-chip.top-score {
border-color: rgba(124,58,237,0.5);
background: rgba(124,58,237,0.1);
}

.score-val {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 14px;
color: var(–text);
}

.score-chip.top-score .score-val { color: var(–accent); }

.score-prob {
font-size: 10px;
color: var(–text-dim);
margin-top: 2px;
}

/* ── FORM SECTION ── */
.form-section {
padding: 0 20px 16px;
}

.form-team-row {
margin-bottom: 12px;
}

.form-team-name {
font-size: 11px;
color: var(–text-muted);
margin-bottom: 6px;
display: flex;
justify-content: space-between;
}

.form-dots {
display: flex;
gap: 5px;
}

.form-dot {
width: 28px;
height: 28px;
border-radius: 8px;
display: flex;
align-items: center;
justify-content: center;
font-size: 10px;
font-weight: 600;
}

.form-dot.w { background: rgba(34,197,94,0.15); color: var(–green); border: 1px solid rgba(34,197,94,0.3); }
.form-dot.d { background: rgba(234,179,8,0.15); color: var(–yellow); border: 1px solid rgba(234,179,8,0.3); }
.form-dot.l { background: rgba(239,68,68,0.15); color: var(–red); border: 1px solid rgba(239,68,68,0.3); }

/* ── H2H ── */
.h2h-section {
padding: 0 20px 24px;
}

.h2h-match {
display: flex;
align-items: center;
justify-content: space-between;
padding: 8px 0;
border-bottom: 1px solid var(–border);
}

.h2h-match:last-child { border-bottom: none; }

.h2h-date {
font-size: 10px;
color: var(–text-dim);
width: 60px;
}

.h2h-teams {
flex: 1;
text-align: center;
font-size: 11px;
color: var(–text-muted);
}

.h2h-score {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 13px;
color: var(–text);
width: 40px;
text-align: right;
}

/* ── STATS STRIP ── */
.stats-strip {
display: flex;
gap: 6px;
padding: 0 20px 16px;
}

.stat-pill {
flex: 1;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 10px;
padding: 8px 6px;
text-align: center;
}

.stat-val {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 15px;
color: var(–accent);
}

.stat-key {
font-size: 9px;
color: var(–text-dim);
margin-top: 2px;
letter-spacing: 0.5px;
}

/* ── DIVIDER ── */
.modal-divider {
height: 1px;
background: var(–border);
margin: 4px 20px 16px;
}

.modal-section-title {
padding: 0 20px 10px;
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-dim);
}

/* ── FETCHING STATE ── */
.fetching-overlay {
padding: 40px 20px;
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
}

.fetching-spinner {
width: 40px;
height: 40px;
border: 2px solid var(–border);
border-top-color: var(–purple);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}

.fetching-label {
font-size: 12px;
color: var(–text-muted);
letter-spacing: 1px;
text-align: center;
}

.fetching-sublabel {
font-size: 10px;
color: var(–text-dim);
text-align: center;
}

/* ── EMPTY ── */
.empty-state {
padding: 60px 20px;
text-align: center;
color: var(–text-dim);
font-size: 12px;
letter-spacing: 1px;
}

/* ── ERROR TOAST ── */
.toast {
position: fixed;
bottom: 80px;
left: 50%;
transform: translateX(-50%);
background: rgba(239,68,68,0.15);
border: 1px solid rgba(239,68,68,0.4);
color: var(–red);
padding: 10px 20px;
border-radius: 10px;
font-size: 12px;
z-index: 300;
display: none;
white-space: nowrap;
}

.toast.show { display: block; }
</style>

</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">👻</div>
    Score<span>Phantom</span>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE
  </div>
</header>

<main>
  <div class="search-section">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search teams or leagues..." oninput="filterFixtures()">
    </div>
    <div class="filter-scroll" id="filterChips">
      <div class="filter-chip active" onclick="setFilter('all', this)">All</div>
    </div>
  </div>

  <div class="section-label">
    Upcoming Fixtures
    <span class="section-count" id="fixtureCount">—</span>
  </div>

  <div id="fixtureList">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">LOADING FIXTURES...</div>
    </div>
  </div>
</main>

<!-- PREDICTION MODAL -->

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modalContent">
      <div class="fetching-overlay">
        <div class="fetching-spinner"></div>
        <div class="fetching-label">ANALYSING MATCH...</div>
        <div class="fetching-sublabel">Fetching historical data & computing predictions</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://score-phantom.onrender.com/api';

let allFixtures = [];
let activeFilter = 'all';
let searchQuery = '';

// ── INIT ──
async function init() {
  try {
    const res = await fetch(`${API}/fixtures?limit=200`);
    const data = await res.json();
    allFixtures = data.fixtures || [];
    buildFilters();
    renderFixtures();
  } catch (e) {
    document.getElementById('fixtureList').innerHTML =
      '<div class="empty-state">Failed to load fixtures.<br>Check connection.</div>';
  }
}

// ── BUILD FILTERS ──
function buildFilters() {
  const categories = [...new Set(allFixtures.map(f => f.category_name).filter(Boolean))].sort();
  const container = document.getElementById('filterChips');
  categories.slice(0, 12).forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.textContent = cat;
    chip.onclick = () => setFilter(cat, chip);
    container.appendChild(chip);
  });
}

function setFilter(val, el) {
  activeFilter = val;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderFixtures();
}

function filterFixtures() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  renderFixtures();
}

// ── RENDER FIXTURES ──
function renderFixtures() {
  let list = allFixtures;

  if (activeFilter !== 'all') {
    list = list.filter(f => f.category_name === activeFilter);
  }

  if (searchQuery) {
    list = list.filter(f =>
      f.home_team_name?.toLowerCase().includes(searchQuery) ||
      f.away_team_name?.toLowerCase().includes(searchQuery) ||
      f.tournament_name?.toLowerCase().includes(searchQuery)
    );
  }

  document.getElementById('fixtureCount').textContent = list.length;

  if (list.length === 0) {
    document.getElementById('fixtureList').innerHTML =
      '<div class="empty-state">No fixtures found</div>';
    return;
  }

  const html = list.map(f => {
    const date = f.match_date ? new Date(f.match_date) : null;
    const timeStr = date ? date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '—';

    return `
      <div class="fixture-card ${f.enriched ? 'enriched' : ''}" onclick="openPrediction('${f.id}', '${esc(f.home_team_name)}', '${esc(f.away_team_name)}', '${esc(f.tournament_name)}', '${esc(f.category_name)}')">
        <div class="fixture-meta">
          <div class="fixture-league">
            <div class="league-dot"></div>
            ${esc(f.tournament_name || '—')}
          </div>
          <div class="fixture-time">${timeStr}</div>
        </div>
        <div class="fixture-teams">
          <div class="team">
            <div class="team-name">${esc(f.home_team_name)}</div>
            <div class="team-country">${esc(f.category_name || '')}</div>
          </div>
          <div class="vs-badge">VS</div>
          <div class="team away">
            <div class="team-name">${esc(f.away_team_name)}</div>
            <div class="team-country">${esc(f.category_name || '')}</div>
          </div>
        </div>
        <div class="fixture-footer">
          ${f.enriched ? '<span class="enriched-tag">Analysed</span>' : '<span style="font-size:9px;color:var(--text-dim);">Tap to analyse</span>'}
          <span class="predict-btn">Predict →</span>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('fixtureList').innerHTML = html;
}

function esc(str) {
  if (!str) return '';
  return str.replace(/'/g, "\\'").replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── OPEN PREDICTION ──
async function openPrediction(id, home, away, league, category) {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalContent').innerHTML = `
    <div class="fetching-overlay">
      <div class="fetching-spinner"></div>
      <div class="fetching-label">ANALYSING MATCH...</div>
      <div class="fetching-sublabel">Fetching historical data &amp; computing predictions</div>
    </div>
  `;

  try {
    const res = await fetch(`${API}/predict/${id}`);
    if (!res.ok) throw new Error('Prediction failed');
    const data = await res.json();
    renderPrediction(data, home, away, league, category);

    // Update fixture as enriched in local list
    const fx = allFixtures.find(f => f.id === id);
    if (fx) fx.enriched = 1;
    renderFixtures();
  } catch (e) {
    document.getElementById('modalContent').innerHTML = `
      <div class="fetching-overlay">
        <div style="font-size:24px">⚠️</div>
        <div class="fetching-label" style="color:var(--red)">Analysis Failed</div>
        <div class="fetching-sublabel">${e.message}</div>
      </div>
    `;
  }
}

// ── RENDER PREDICTION ──
function renderPrediction(data, home, away, league, category) {
  const p = data.predictions;
  const f = data.features;
  const m = data.model;

  // Top pick logic
  const mr = p.match_result;
  const picks = [
    { label: `${home} Win`, prob: mr.home },
    { label: 'Draw', prob: mr.draw },
    { label: `${away} Win`, prob: mr.away },
  ];
  const topPick = picks.reduce((a, b) => a.prob > b.prob ? a : b);
  const confVal = topPick.prob;
  const confPct = Math.round(confVal * 100);

  // Form data
  const hf = f.homeFeatures;
  const af = f.awayFeatures;
  const h2hF = f.h2hFeatures;

  // Build form dots from win/draw/loss rates (approximation)
  function buildFormDots(features) {
    const dots = [];
    const n = features.matches_available || 0;
    const wins = Math.round((features.win_rate || 0) * n);
    const draws = Math.round((features.draw_rate || 0) * n);
    const losses = n - wins - draws;
    for (let i = 0; i < wins; i++) dots.push('W');
    for (let i = 0; i < draws; i++) dots.push('D');
    for (let i = 0; i < losses; i++) dots.push('L');
    return dots.slice(0, 5);
  }

  const homeDots = buildFormDots(hf);
  const awayDots = buildFormDots(af);

  function dotHtml(dots) {
    return dots.map(d => `<div class="form-dot ${d.toLowerCase()}">${d}</div>`).join('');
  }

  function pct(v) { return (v * 100).toFixed(0) + '%'; }
  function colorClass(v) {
    if (v >= 0.65) return 'high';
    if (v >= 0.45) return 'med';
    return 'low';
  }

  const topScores = p.correct_score.slice(0, 6);

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div style="width:32px"></div>
      <div>
        <div class="modal-match-title">${home} <span style="color:var(--text-dim);font-weight:400">vs</span> ${away}</div>
        <div class="modal-league-tag">${league} · ${category}</div>
      </div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>

    <!-- TOP PICK -->
    <div class="top-pick-card">
      <div class="top-pick-label">Recommended Bet</div>
      <div class="top-pick-value">${topPick.label}</div>
      <div class="top-pick-prob">Probability: <strong>${pct(topPick.prob)}</strong> · Confidence: ${mr.confidence || 'LOW'}</div>
      <div class="confidence-bar"><div class="confidence-fill" style="width:${confPct}%"></div></div>
    </div>

    <!-- MATCH RESULT BARS -->
    <div class="result-section">
      <div class="result-section-title">Match Result</div>
      <div class="result-row">
        <div class="result-label">${home.split(' ')[0]}</div>
        <div class="result-bar-wrap"><div class="result-bar bar-home" style="width:${pct(mr.home)}"></div></div>
        <div class="result-pct">${pct(mr.home)}</div>
      </div>
      <div class="result-row">
        <div class="result-label">Draw</div>
        <div class="result-bar-wrap"><div class="result-bar bar-draw" style="width:${pct(mr.draw)}"></div></div>
        <div class="result-pct">${pct(mr.draw)}</div>
      </div>
      <div class="result-row">
        <div class="result-label">${away.split(' ')[0]}</div>
        <div class="result-bar-wrap"><div class="result-bar bar-away" style="width:${pct(mr.away)}"></div></div>
        <div class="result-pct">${pct(mr.away)}</div>
      </div>
    </div>

    <!-- STATS STRIP -->
    <div class="stats-strip">
      <div class="stat-pill">
        <div class="stat-val">${m.lambdaHome}</div>
        <div class="stat-key">xG HOME</div>
      </div>
      <div class="stat-pill">
        <div class="stat-val">${m.lambdaAway}</div>
        <div class="stat-key">xG AWAY</div>
      </div>
      <div class="stat-pill">
        <div class="stat-val">${pct(p.btts.yes)}</div>
        <div class="stat-key">BTTS</div>
      </div>
      <div class="stat-pill">
        <div class="stat-val">${pct(p.over_under.over_2_5)}</div>
        <div class="stat-key">O2.5</div>
      </div>
    </div>

    <div class="modal-divider"></div>

    <!-- MARKETS -->
    <div class="modal-section-title">All Markets</div>
    <div class="market-grid">
      <div class="market-card">
        <div class="market-title">Over / Under</div>
        ${[['O0.5', p.over_under.over_0_5], ['O1.5', p.over_under.over_1_5], ['O2.5', p.over_under.over_2_5], ['O3.5', p.over_under.over_3_5]].map(([k, v]) =>
          `<div class="market-row"><span class="market-key">${k}</span><span class="market-val ${colorClass(v)}">${pct(v)}</span></div>`
        ).join('')}
      </div>
      <div class="market-card">
        <div class="market-title">${home.split(' ')[0]} Goals</div>
        ${[['O0.5', p.home_team_goals.over_0_5], ['O1.5', p.home_team_goals.over_1_5], ['O2.5', p.home_team_goals.over_2_5]].map(([k, v]) =>
          `<div class="market-row"><span class="market-key">${k}</span><span class="market-val ${colorClass(v)}">${pct(v)}</span></div>`
        ).join('')}
        <div class="market-title" style="margin-top:8px">${away.split(' ')[0]} Goals</div>
        ${[['O0.5', p.away_team_goals.over_0_5], ['O1.5', p.away_team_goals.over_1_5]].map(([k, v]) =>
          `<div class="market-row"><span class="market-key">${k}</span><span class="market-val ${colorClass(v)}">${pct(v)}</span></div>`
        ).join('')}
      </div>
    </div>

    <div class="modal-divider"></div>

    <!-- CORRECT SCORE -->
    <div class="modal-section-title">Correct Score</div>
    <div class="scores-section">
      <div class="scores-grid">
        ${topScores.map((s, i) => `
          <div class="score-chip ${i === 0 ? 'top-score' : ''}">
            <div class="score-val">${s.score}</div>
            <div class="score-prob">${pct(s.probability)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="modal-divider"></div>

    <!-- TEAM FORM -->
    <div class="modal-section-title">Recent Form</div>
    <div class="form-section">
      <div class="form-team-row">
        <div class="form-team-name">
          <span>${home}</span>
          <span style="color:var(--text-dim)">${hf.matches_available} matches</span>
        </div>
        <div class="form-dots">${dotHtml(homeDots)}</div>
      </div>
      <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
        <div class="form-team-name">
          <span>${away}</span>
          <span style="color:var(--text-dim)">${af.matches_available} matches</span>
        </div>
        <div class="form-dots">${dotHtml(awayDots)}</div>
      </div>
    </div>

    <div class="modal-divider"></div>

    <!-- H2H -->
    <div class="modal-section-title">Head to Head · ${h2hF.matches_available} matches</div>
    <div class="h2h-section">
      <div class="result-row" style="margin-bottom:12px">
        <div class="result-label" style="font-size:10px">${home.split(' ')[0]}</div>
        <div class="result-bar-wrap"><div class="result-bar bar-home" style="width:${pct(h2hF.home_win_rate)}"></div></div>
        <div class="result-pct">${pct(h2hF.home_win_rate)}</div>
      </div>
      <div class="result-row" style="margin-bottom:12px">
        <div class="result-label" style="font-size:10px">Draw</div>
        <div class="result-bar-wrap"><div class="result-bar bar-draw" style="width:${pct(h2hF.draw_rate)}"></div></div>
        <div class="result-pct">${pct(h2hF.draw_rate)}</div>
      </div>
      <div class="result-row">
        <div class="result-label" style="font-size:10px">${away.split(' ')[0]}</div>
        <div class="result-bar-wrap"><div class="result-bar bar-away" style="width:${pct(h2hF.away_win_rate)}"></div></div>
        <div class="result-pct">${pct(h2hF.away_win_rate)}</div>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px">
        <div class="stat-pill"><div class="stat-val">${h2hF.avg_total_goals?.toFixed(1)}</div><div class="stat-key">AVG GOALS</div></div>
        <div class="stat-pill"><div class="stat-val">${pct(h2hF.btts_rate)}</div><div class="stat-key">BTTS RATE</div></div>
        <div class="stat-pill"><div class="stat-val">${pct(h2hF.over_2_5_rate)}</div><div class="stat-key">O2.5 RATE</div></div>
      </div>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>

</body>
</html>
