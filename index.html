<script>
/* ... existing app logic, rendering, chat and sheet functions ... */

// =====================================================================
// Authentication and user session helpers
// =====================================================================
// Keep track of whether the auth overlay is in signup or login mode
let authMode = 'signup';
// Persist the current user in memory so UI can react to status changes
let currentUser = null;

// Switch between signup and login modes when the tabs are clicked
function switchAuthTab(mode) {
  authMode = mode;
  const signupTab = document.getElementById('signupTab');
  const loginTab = document.getElementById('loginTab');
  const submitBtn = document.getElementById('authSubmitBtn');
  const errorBox = document.getElementById('authError');
  signupTab.classList.toggle('active', mode === 'signup');
  loginTab.classList.toggle('active', mode === 'login');
  submitBtn.textContent = mode === 'signup' ? 'Create Free Account' : 'Login';
  errorBox.classList.remove('show');
  errorBox.textContent = '';
}

// Display an authentication error message
function showAuthError(message) {
  const errorBox = document.getElementById('authError');
  errorBox.textContent = message || 'Something went wrong';
  errorBox.classList.add('show');
}

// Hide any visible authentication error message
function hideAuthError() {
  const errorBox = document.getElementById('authError');
  errorBox.textContent = '';
  errorBox.classList.remove('show');
}

// Submit the signup or login form. Sends a POST request to the appropriate endpoint
async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  const btn = document.getElementById('authSubmitBtn');
  hideAuthError();
  if (!email || !password) {
    showAuthError('Email and password are required');
    return;
  }
  if (authMode === 'signup' && password.length < 6) {
    showAuthError('Password must be at least 6 characters');
    return;
  }
  btn.disabled = true;
  btn.textContent = authMode === 'signup' ? 'Creating...' : 'Logging in...';
  try {
    const endpoint = authMode === 'signup' ? '/api/auth/signup' : '/api/auth/login';
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || 'Authentication failed');
    }
    // Store JWT in localStorage and update the UI
    localStorage.setItem('sp_token', data.token);
    currentUser = data.user || null;
    updateUserUI(currentUser);
    document.getElementById('authOverlay').style.display = 'none';
    await init();
  } catch (err) {
    showAuthError(err.message || 'Authentication failed');
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'signup' ? 'Create Free Account' : 'Login';
  }
}

// Validate the current token with the backend to check if the user is still authenticated
async function checkAuth() {
  const token = localStorage.getItem('sp_token');
  if (!token) {
    document.getElementById('authOverlay').style.display = 'flex';
    return false;
  }
  try {
    const res = await fetch('/api/auth/me', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!res.ok) {
      throw new Error('Session expired');
    }
    const user = await res.json();
    currentUser = user;
    updateUserUI(user);
    document.getElementById('authOverlay').style.display = 'none';
    return true;
  } catch (err) {
    localStorage.removeItem('sp_token');
    currentUser = null;
    document.getElementById('authOverlay').style.display = 'flex';
    return false;
  }
}

// Remove the session token and reset the UI
function logout() {
  localStorage.removeItem('sp_token');
  currentUser = null;
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('userStatusBadge').style.display = 'none';
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
  switchAuthTab('signup');
}

// Determine whether the current user has trial or active status
function isUserActive() {
  if (!currentUser) return false;
  return currentUser.status === 'trial' || currentUser.status === 'active';
}

// Update UI elements based on the current user's subscription status
function updateUserUI(user) {
  const badge = document.getElementById('userStatusBadge');
  const logoutBtn = document.getElementById('logoutBtn');
  if (!user) {
    badge.style.display = 'none';
    logoutBtn.style.display = 'none';
    return;
  }
  logoutBtn.style.display = 'inline-block';
  badge.style.display = 'inline-block';
  if (user.status === 'active') {
    badge.textContent = 'ACTIVE';
    badge.style.background = 'rgba(0,230,118,0.12)';
    badge.style.color = '#00e676';
    badge.style.border = '1px solid rgba(0,230,118,0.25)';
  } else if (user.status === 'trial') {
    badge.textContent = 'TRIAL';
    badge.style.background = 'rgba(0,188,212,0.12)';
    badge.style.color = '#00bcd4';
    badge.style.border = '1px solid rgba(0,188,212,0.25)';
  } else {
    badge.textContent = 'EXPIRED';
    badge.style.background = 'rgba(255,23,68,0.12)';
    badge.style.color = '#ff1744';
    badge.style.border = '1px solid rgba(255,23,68,0.25)';
  }
}

// Mark the first few fixtures as free for trial users
function markFreeFixtures(fixtures) {
  if (!Array.isArray(fixtures)) return [];
  return fixtures.map((f, i) => ({ ...f, _isFree: i < 3 }));
}

// Initiate the payment flow by calling the backend and redirecting to Paystack
async function initPayment() {
  const token = localStorage.getItem('sp_token');
  if (!token) {
    showAuthError('Login first');
    document.getElementById('authOverlay').style.display = 'flex';
    return;
  }
  try {
    const res = await fetch('/api/auth/payment/initialize', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: 'Bearer ' + token,
      },
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || 'Failed to initialize payment');
    }
    if (data.authorization_url) {
      window.location.href = data.authorization_url;
    } else {
      throw new Error('No payment link returned');
    }
  } catch (err) {
    alert(err.message || 'Payment initialization failed');
  }
}

// =====================================================================
// Main app initializer. Builds the date tabs and loads fixtures once auth passes
// =====================================================================
async function init(){
  buildDateTabs();
  try{
    const res=await fetch(`${API}/fixtures?limit=2000`);
    const data=await res.json();
    allFixtures=markFreeFixtures(data.fixtures||[]);
    applyFilters();
  }catch(err){
    document.getElementById('main').innerHTML='<div class="empty">Failed to load.</div>';
  }
}

// Start with auth check
checkAuth().then(authed => { if (authed) init(); });
</script>
</body>
</html>
