    <path d="M 80 40 L 80 10" />
    <path d="M 105 60 L 135 50" />
    <path d="M 95 95 L 120 120" />
    <path d="M 65 95 L 40 120" />
    <path d="M 55 60 L 25 50" />
  </g>

  <!-- Ghost Shape -->
  <path d="M 160 270 
           C 160 240, 160 170, 190 120 
           C 220 70, 292 70, 322 120 
           C 352 170, 352 240, 352 270 
           C 360 270, 370 280, 370 300 
           L 360 300 
           C 340 280, 310 260, 256 260 
           C 202 260, 172 280, 152 300 
           L 142 300 
           C 142 280, 152 270, 160 270 Z" 
