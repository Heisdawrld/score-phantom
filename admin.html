<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScorePhantom Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e0e6f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #8892a4; font-size: 14px; margin-bottom: 20px; }
    .login-box { max-width: 400px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; margin: 60px auto; }
    .login-box h2 { margin-bottom: 16px; }
    input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e0e6f0; font-size: 15px; padding: 12px; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #4f89ff; }
    button { background: #4f89ff; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 15px; font-weight: 600; padding: 12px 20px; touch-action: manipulation; }
    button:hover { background: #3a6fd8; }
    button:active { opacity: 0.8; }
    button.danger { background: #c0392b; }
    button.success { background: #27ae60; }
    button.danger { background: #c0392b; }
    button.danger:hover { background: #e74c3c; }
    button.small { font-size: 13px; padding: 7px 14px; }
    .error { color: #e05c5c; font-size: 14px; margin-top: 8px; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 16px; }
    .stat-card .num { font-size: 28px; font-weight: 700; color: #4f89ff; }
    .stat-card .label { font-size: 12px; color: #8892a4; margin-top: 2px; }

    /* Upgrade form */
    .upgrade-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .upgrade-form input { margin-bottom: 0; }
    .upgrade-row { display: flex; gap: 8px; align-items: center; }
    .upgrade-row input { flex: 1; min-width: 60px; width: auto; margin-bottom: 0; }
    .upgrade-row .days-label { font-size: 13px; color: #8892a4; white-space: nowrap; }
    .upgrade-form button { width: 100%; padding: 13px; font-size: 16px; }

    /* Section headings */
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #c9d1d9; }

    /* Desktop table */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; border: 1px solid #30363d; }
    table { width: 100%; border-collapse: collapse; background: #161b22; }
    th { background: #21262d; color: #8892a4; font-size: 12px; font-weight: 600; padding: 10px 14px; text-align: left; white-space: nowrap; }
    td { padding: 10px 14px; border-top: 1px solid #21262d; font-size: 14px; }
    .hide-mobile { display: table-cell; }

    /* Mobile card list */
    .user-cards { display: none; flex-direction: column; gap: 10px; }
    .user-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px; }
    .user-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .user-card-email { font-size: 14px; font-weight: 500; word-break: break-all; flex: 1; margin-right: 10px; }
    .user-card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #8892a4; }
    .user-card-expires { }
    .user-card-action { margin-top: 10px; }
    .user-card-action button { width: 100%; }

    /* Badges */
    .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .badge.premium { background: rgba(79,175,110,.15); color: #4faf6e; }
    .badge.trial { background: rgba(79,137,255,.15); color: #4f89ff; }
    .badge.expired { background: rgba(224,92,92,.15); color: #e05c5c; }

    #adminPanel { display: none; }
    .msg { padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
    .msg.ok { background: rgba(79,175,110,.15); color: #4faf6e; }
    .msg.err { background: rgba(224,92,92,.15); color: #e05c5c; }

    /* Mobile breakpoint */
    @media (max-width: 600px) {
      body { padding: 12px; }
      h1 { font-size: 20px; }
      .hide-mobile { display: none; }
      .table-wrap table { display: none; }
      .user-cards { display: flex; }
    }

    /* Wide screens: 4-column stats */
    @media (min-width: 600px) {
      .stats-row { grid-template-columns: repeat(4, 1fr); }
      .upgrade-form { flex-direction: row; align-items: center; flex-wrap: wrap; }
      .upgrade-form > input { flex: 1; min-width: 200px; margin-bottom: 0; }
      .upgrade-form button { width: auto; }
    }
  </style>
</head>
<body>

  <div id="loginPanel">
    <div class="login-box">
      <h2>🔐 Admin Login</h2>
      <input id="secretInput" type="password" placeholder="Admin secret key" onkeydown="if(event.key==='Enter')adminLogin()">
      <button onclick="adminLogin()" style="width:100%">Login</button>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <div id="adminPanel">
    <h1>⚡ ScorePhantom Admin</h1>
    <div class="subtitle">User management panel</div>

    <div id="statsRow" class="stats-row"></div>

    <div id="actionMsg"></div>

    <div class="section-title">Quick Upgrade</div>
    <div class="upgrade-form">
      <input id="upgradeEmail" type="email" placeholder="user@email.com">
      <div class="upgrade-row">
        <input id="upgradeDays" type="number" value="30" min="1" max="365" style="max-width:80px">
        <span class="days-label">days</span>
      </div>
      <button onclick="upgradeByEmail()">⬆ Upgrade to Premium</button>
    </div>

    <div class="section-title">All Users</div>

    <!-- Desktop table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Status</th>
            <th>Expires</th>
            <th class="hide-mobile">Payments</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>

    <!-- Mobile cards -->
    <div id="userCards" class="user-cards"></div>
  </div>

  <script>
    var adminSecret = '';

    function adminLogin() {
      var secret = document.getElementById('secretInput').value.trim();
      if (!secret) { document.getElementById('loginError').textContent = 'Enter the admin secret'; return; }
      adminSecret = secret;
      loadUsers();
    }

    function showMsg(text, type) {
      var el = document.getElementById('actionMsg');
      el.innerHTML = '<div class="msg ' + type + '">' + text + '</div>';
      setTimeout(function() { el.innerHTML = ''; }, 5000);
    }

    async function loadUsers() {
      try {
        var res = await fetch('/api/auth/admin/users', { headers: { 'x-admin-secret': adminSecret } });
        if (res.status === 401) { document.getElementById('loginError').textContent = 'Wrong secret key'; return; }
        var data = await res.json();

        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';

        var users = data.users || [];
        var total = data.total || users.length;
        var premium = users.filter(function(u) { return u.status === 'premium'; }).length;
        var trial = users.filter(function(u) { return u.status === 'trial'; }).length;
        var expired = total - premium - trial;

        document.getElementById('statsRow').innerHTML =
          stat(total, 'Total Users') +
          stat(premium, 'Premium', '#4faf6e') +
          stat(trial, 'Trial', '#4f89ff') +
          stat(expired, 'Expired', '#e05c5c');

        // Table rows (desktop)
        var rows = users.map(function(u) {
          var expText = formatExpiry(u);
          var paymentsText = (u.payments || []).length > 0
            ? (u.payments || []).map(function(p) { return p.status; }).join(', ')
            : '—';
          return '<tr>' +
            '<td>' + u.id + '</td>' +
            '<td style="word-break:break-all">' + u.email + '</td>' +
            '<td><span class="badge ' + (u.status || 'expired') + '">' + (u.status || 'expired') + '</span></td>' +
            '<td>' + expText + '</td>' +
            '<td class="hide-mobile" style="font-size:12px;color:#8892a4">' + paymentsText + '</td>' +
            '<td style="display:flex;gap:6px;flex-wrap:wrap">' +
              '<button class="small success" onclick="quickUpgrade(\'' + escEmail(u.email) + '\')">Upgrade</button>' +
              '<button class="small danger" onclick="removeUser(\'' + escEmail(u.email) + '\')">🗑 Remove</button>' +
            '</td>' +
          '</tr>';
        }).join('');
        document.getElementById('usersTable').innerHTML = rows || '<tr><td colspan="6" style="color:#8892a4;text-align:center;padding:20px">No users found</td></tr>';

        // Mobile cards
        var cards = users.map(function(u) {
          var expText = formatExpiry(u);
          return '<div class="user-card">' +
            '<div class="user-card-top">' +
              '<div class="user-card-email">' + u.email + '</div>' +
              '<span class="badge ' + (u.status || 'expired') + '">' + (u.status || 'expired') + '</span>' +
            '</div>' +
            '<div class="user-card-meta">' +
              '<span>ID #' + u.id + '</span>' +
              '<span>Expires: ' + expText + '</span>' +
            '</div>' +
            '<div class="user-card-action" style="display:flex;gap:8px">' +
              '<button class="small success" style="flex:1" onclick="quickUpgrade(\'' + escEmail(u.email) + '\')">⬆ Upgrade</button>' +
              '<button class="small danger" style="flex:1" onclick="removeUser(\'' + escEmail(u.email) + '\')">🗑 Remove</button>' +
            '</div>' +
          '</div>';
        }).join('');
        document.getElementById('userCards').innerHTML = cards || '<div style="color:#8892a4;text-align:center;padding:20px">No users found</div>';

      } catch (err) {
        document.getElementById('loginError').textContent = 'Error: ' + err.message;
      }
    }

    function formatExpiry(u) {
      var exp = u.premium_expires_at || u.subscription_expires_at || u.trial_ends_at || '';
      return exp ? new Date(exp).toLocaleDateString() : '—';
    }

    function escEmail(email) {
      return email.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function stat(num, label, color) {
      return '<div class="stat-card"><div class="num" style="color:' + (color || '#4f89ff') + '">' + num + '</div><div class="label">' + label + '</div></div>';
    }

    async function removeUser(email) {
      if (!confirm('⚠️ Remove user "' + email + '"?\n\nThis will permanently delete their account and all payment records. This cannot be undone.')) return;
      try {
        var res = await fetch('/api/auth/admin/remove-user', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret },
          body: JSON.stringify({ email: email }),
        });
        var data = await res.json();
        if (data.success) {
          showMsg('🗑 ' + data.message, 'ok');
          loadUsers();
        } else {
          showMsg('Error: ' + (data.error || 'Unknown error'), 'err');
        }
      } catch (err) {
        showMsg('Error: ' + err.message, 'err');
      }
    }

    function quickUpgrade(email) {
      document.getElementById('upgradeEmail').value = email;
      upgradeByEmail();
    }

    async function upgradeByEmail() {
      var email = document.getElementById('upgradeEmail').value.trim();
      var days = parseInt(document.getElementById('upgradeDays').value || '30', 10);
      if (!email) { showMsg('Enter an email address', 'err'); return; }
      try {
        var res = await fetch('/api/auth/admin/upgrade-by-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret },
          body: JSON.stringify({ email: email, days: days }),
        });
        var data = await res.json();
        if (data.success) {
          showMsg('✓ ' + data.email + ' upgraded to premium until ' + new Date(data.premium_expires_at).toLocaleDateString(), 'ok');
          document.getElementById('upgradeEmail').value = '';
          loadUsers();
        } else {
          showMsg('Error: ' + (data.error || 'Unknown error'), 'err');
        }
      } catch (err) {
        showMsg('Error: ' + err.message, 'err');
      }
    }
  </script>
</body>
</html>
